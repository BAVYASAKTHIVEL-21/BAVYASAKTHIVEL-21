<svg viewBox="0 0 170 185" xmlns="http://www.w3.org/2000/svg" fill="none" role="img">
  <defs><filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.5"/></filter></defs>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="3.2s" repeatCount="indefinite"/>
    <!-- antenna -->
    <line x1="85" y1="34" x2="85" y2="18" stroke="#4FD1C5" stroke-width="3"/>
    <circle cx="85" cy="14" r="5" fill="#7BF5E8" filter="url(#g)"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite"/></circle>
    <!-- head -->
    <rect x="48" y="34" width="74" height="50" rx="14" fill="#0E2730" stroke="#4FD1C5" stroke-width="3"/>
    <!-- eyes (blink) -->
    <g fill="#7BF5E8">
      <ellipse cx="68" cy="57" rx="6" ry="7"><animate attributeName="ry" values="7;7;7;7;1;7;7" dur="4.5s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="102" cy="57" rx="6" ry="7"><animate attributeName="ry" values="7;7;7;7;1;7;7" dur="4.5s" repeatCount="indefinite"/></ellipse>
    </g>
    <!-- smile -->
    <path d="M70 70 Q85 80 100 70" stroke="#4FD1C5" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- body -->
    <rect x="54" y="90" width="62" height="48" rx="12" fill="#0C1B21" stroke="#4FD1C5" stroke-width="3"/>
    <line x1="64" y1="104" x2="92" y2="104" stroke="#4FD1C5" stroke-opacity="0.5" stroke-width="2.5"/>
    <circle cx="85" cy="120" r="5" fill="#4FD1C5"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <!-- legs -->
    <rect x="66" y="138" width="9" height="12" rx="3" fill="#4FD1C5"/>
    <rect x="95" y="138" width="9" height="12" rx="3" fill="#4FD1C5"/>
    <!-- left arm (still) -->
    <rect x="40" y="98" width="12" height="9" rx="4" fill="#4FD1C5"/>
    <!-- right arm (waving) -->
    <g transform="rotate(0 118 100)">
      <animateTransform attributeName="transform" type="rotate" values="-15 118 100; 25 118 100; -15 118 100" dur="1.1s" repeatCount="indefinite"/>
      <rect x="116" y="84" width="11" height="22" rx="5" fill="#4FD1C5"/>
      <circle cx="121" cy="80" r="6" fill="#7BF5E8"/>
    </g>
  </g>
</svg>